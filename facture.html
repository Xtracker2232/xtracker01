<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vérifier une facture — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#070a14;color:#eef0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0c0f20;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px;width:100%;max-width:560px}
h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px}
.sub{font-size:13px;color:rgba(238,240,255,0.45);margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(238,240,255,0.45);display:block;margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px 14px;font-size:12px;color:#eef0ff;font-family:monospace;outline:none;margin-bottom:12px}
input:focus{border-color:rgba(99,102,241,0.5)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;width:100%}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.btn-success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
.result{margin-top:20px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;display:none}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px}
.row:last-child{border:none}
.key{color:rgba(238,240,255,0.45)}
.val{font-weight:600}
.status-pending{color:#f59e0b}
.status-completed{color:#22c55e}
.status-cancelled{color:#ef4444}
.actions{display:flex;gap:8px;margin-top:16px}
.notif{position:fixed;top:20px;right:20px;background:#22c55e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:999}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(238,240,255,0.45);font-size:13px;text-decoration:none;margin-bottom:20px}
.back:hover{color:#eef0ff}
</style>
</head>
<body>
<div class="card">
  <a href="admin.html" class="back">← Retour admin</a>
  <h1>₿ Vérifier une facture crypto</h1>
  <div class="sub">Colle l'ID de facture pour voir le statut et valider manuellement</div>

  <label>ID de facture</label>
  <input id="order-input" placeholder="xtracker-123-pro-1748000000" oninput="clearResult()">
  <button class="btn btn-primary" onclick="lookup()">Vérifier</button>

  <div class="result" id="result">
    <div class="row"><span class="key">Statut</span><span class="val" id="r-status">—</span></div>
    <div class="row"><span class="key">Utilisateur</span><span class="val" id="r-user">—</span></div>
    <div class="row"><span class="key">Pack</span><span class="val" id="r-type">—</span></div>
    <div class="row"><span class="key">Montant</span><span class="val" id="r-amount">—</span></div>
    <div class="row"><span class="key">Credits</span><span class="val" id="r-credits">—</span></div>
    <div class="row"><span class="key">Date</span><span class="val" id="r-date">—</span></div>
    <div class="row"><span class="key">ID</span><span class="val" id="r-id" style="font-family:monospace;font-size:11px;word-break:break-all">—</span></div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-success" onclick="validate()">✅ Valider et ajouter les crédits</button>
      <button class="btn btn-danger" onclick="cancel()">✕ Annuler</button>
    </div>
  </div>
</div>
<div class="notif" id="notif"></div>

<script>
var API = '';
var token = localStorage.getItem('token');
if(!token) window.location.href = 'login.html';

function hdr(){ return {'Authorization': 'Bearer '+token, 'Content-Type': 'application/json'}; }

function notif(msg, ok){
  var el = document.getElementById('notif');
  el.textContent = msg;
  el.style.background = ok === false ? '#ef4444' : '#22c55e';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 3000);
}

function clearResult(){
  document.getElementById('result').style.display = 'none';
}

async function lookup(){
  var id = document.getElementById('order-input').value.trim();
  if(!id){ notif('Colle un ID de facture', false); return; }
  try {
    var r = await fetch(API+'/api/admin/crypto-order?order_id='+encodeURIComponent(id), {headers: hdr()});
    var d = await r.json();
    if(!r.ok){ notif(d.detail||'Introuvable', false); return; }
    var status = d.status||'pending';
    var statusClass = 'status-'+status;
    var statusLabel = status === 'completed' ? '✅ Payé' : status === 'pending' ? '⏳ En attente' : status === 'confirming' ? '🔍 En vérification' : '❌ Annulé';
    document.getElementById('r-status').innerHTML = '<span class="'+statusClass+'">'+statusLabel+'</span>';
    document.getElementById('r-user').textContent = d.username || '#'+d.user_id;
    document.getElementById('r-type').textContent = d.type || '—';
    document.getElementById('r-amount').textContent = (d.amount_eur||0)+'€';
    document.getElementById('r-credits').textContent = d.credits || '—';
    document.getElementById('r-date').textContent = (d.created_at||'').toString().slice(0,19);
    document.getElementById('r-id').textContent = d.stripe_id || id;
    var result = document.getElementById('result');
    result.style.display = 'block';
    var actions = document.getElementById('actions');
    actions.style.display = (status !== 'completed' && status !== 'cancelled') ? 'flex' : 'none';
  } catch(e) { notif('Erreur réseau', false); }
}

async function validate(){
  var id = document.getElementById('order-input').value.trim();
  if(!confirm('Valider ce paiement et ajouter les crédits ?')) return;
  try {
    var r = await fetch(API+'/api/admin/crypto-validate', {method:'POST', headers:hdr(), body:JSON.stringify({order_id:id})});
    var d = await r.json();
    if(r.ok){ notif('Crédits ajoutés !'); lookup(); }
    else notif(d.detail||'Erreur', false);
  } catch(e){ notif('Erreur réseau', false); }
}

async function cancel(){
  var id = document.getElementById('order-input').value.trim();
  if(!confirm('Annuler cette commande ?')) return;
  try {
    var r = await fetch(API+'/api/admin/crypto-cancel', {method:'POST', headers:hdr(), body:JSON.stringify({order_id:id})});
    if(r.ok){ notif('Commande annulée'); lookup(); }
  } catch(e){ notif('Erreur réseau', false); }
}
</script>
</body>
</html>
