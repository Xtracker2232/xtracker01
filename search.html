<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche — Xtracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0a0d1a;--bg3:#0d1020;
  --border:rgba(255,255,255,0.06);--ba:rgba(99,102,241,0.25);
  --text:#f0f2ff;--muted:#4a5280;--muted2:#8892c0;
  --accent:#6366f1;--accent2:#818cf8;--violet:#a78bfa;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 10% 10%,rgba(99,102,241,0.06) 0%,transparent 60%),
             radial-gradient(ellipse 40% 30% at 90% 90%,rgba(167,139,250,0.05) 0%,transparent 60%)}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  height:60px;padding:0 48px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,8,15,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;text-decoration:none;color:var(--text)}
.logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:16px}
.credits-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);
  padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;
}
.c-free{color:var(--accent2)}.c-paid{color:var(--violet)}
.nav-link{font-size:13px;color:var(--muted2);text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--text)}
.nav-btn{
  font-size:13px;font-weight:600;padding:7px 18px;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;border-radius:7px;text-decoration:none;transition:all .2s;
  box-shadow:0 2px 12px rgba(99,102,241,0.25);
}
.nav-btn:hover{box-shadow:0 4px 20px rgba(99,102,241,0.4)}

/* LAYOUT */
.layout{max-width:860px;margin:0 auto;padding:48px 40px 80px;position:relative;z-index:10}
.page-header{margin-bottom:32px}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--muted2)}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2)}
.ptab{
  padding:13px 24px;font-size:13px;font-weight:500;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--muted2);cursor:pointer;font-family:inherit;
  transition:all .2s;margin-bottom:-1px;
}
.ptab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.ptab:hover:not(.active){color:var(--text)}
.panel-body{padding:28px}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.fgroup{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:500;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase}
input{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;
  outline:none;transition:all .2s;
}
input:focus{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.05);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
input::placeholder{color:var(--muted);font-size:13px}

.toggle-row{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;
  cursor:pointer;
}
.tog{width:34px;height:18px;background:rgba(255,255,255,0.1);border-radius:9px;position:relative;flex-shrink:0;transition:background .2s}
.tog::after{content:'';position:absolute;left:3px;top:3px;width:12px;height:12px;background:var(--muted);border-radius:50%;transition:all .2s}
input[type=checkbox]:checked+.tog{background:rgba(99,102,241,0.4)}
input[type=checkbox]:checked+.tog::after{left:19px;background:var(--accent2)}
input[type=checkbox]{display:none}
.tog-label{font-size:13px;color:var(--muted2)}

.btn-run{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-size:14px;font-weight:600;border:none;border-radius:9px;
  cursor:pointer;font-family:'Syne',sans-serif;
  transition:all .25s;box-shadow:0 4px 20px rgba(99,102,241,0.3);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-run:hover{box-shadow:0 6px 28px rgba(99,102,241,0.45);transform:translateY(-1px)}
.btn-run:active{transform:none}
.btn-run:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

/* SPINNER */
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULTS */
#results{margin-top:24px}
.res-bar{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--muted);
  padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.res-bar strong{color:var(--text)}

.rcard{
  border:1px solid var(--border);border-radius:10px;margin-bottom:8px;
  overflow:hidden;background:rgba(255,255,255,0.02);
  transition:border-color .2s;animation:fadeUp .3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rcard:hover{border-color:rgba(99,102,241,0.25)}

.rcard-top{
  padding:13px 18px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:background .15s;
}
.rcard-top:hover{background:rgba(99,102,241,0.04)}
.rname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.3px}
.rmeta{font-size:12px;color:var(--muted2);margin-top:3px}
.rtop-right{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge.hi{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.badge.md{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.2)}
.badge.lo{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.rarr{color:var(--muted);font-size:11px;transition:transform .2s}

.rcard-body{display:none;padding:14px 18px 18px;border-top:1px solid var(--border)}
.rcard-body.open{display:block}
.rfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:14px}
.rf{display:flex;flex-direction:column;gap:3px}
.rf-k{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.rf-v{font-size:13px;font-weight:500;color:var(--text)}
.rsources{display:flex;flex-wrap:wrap;gap:5px;padding-top:12px;border-top:1px solid var(--border)}
.src{font-size:10px;color:var(--muted2);background:rgba(255,255,255,0.03);border:1px solid var(--border);padding:2px 8px;border-radius:4px}

/* ÉTATS */
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:36px;display:block;margin-bottom:12px;opacity:0.4}
.empty-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--muted2)}

.err-box{padding:12px 16px;border-radius:8px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);font-size:13px;color:#fca5a5}

.no-credits-box{
  text-align:center;padding:40px 24px;
  background:rgba(99,102,241,0.05);border:1px solid rgba(99,102,241,0.15);border-radius:10px;
}
.no-credits-box h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px}
.no-credits-box p{font-size:13px;color:var(--muted2);margin-bottom:20px}
.btn-credits{
  padding:10px 24px;
  background:linear-gradient(135deg,var(--accent),var(--violet));
  color:#fff;font-size:13px;font-weight:600;
  border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;
  text-decoration:none;display:inline-block;transition:all .2s;
  box-shadow:0 4px 16px rgba(99,102,241,0.25);
}

/* NOTIF */
.notif{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 18px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation:slideIn .3s cubic-bezier(.16,1,.3,1);max-width:300px;
}
.notif.ok{border-color:rgba(34,197,94,0.3);color:var(--green)}
.notif.err{border-color:rgba(239,68,68,0.3);color:#fca5a5}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

@media(max-width:640px){
  nav{padding:0 20px}.nav-link{display:none}
  .layout{padding:28px 20px 60px}
  .fg{grid-template-columns:1fr}
  .panel-body{padding:20px 16px}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">X<span>tracker</span></a>
  <div class="nav-right">
    <div class="credits-pill" id="credits-pill" style="display:none">
      <span class="c-free">🎁 <span id="free-left">—</span></span>
      <span style="color:var(--border)">·</span>
      <span class="c-paid">⚡ <span id="paid-credits">—</span></span>
    </div>
    <a href="dashboard.html" class="nav-link" id="link-dash" style="display:none">Dashboard</a>
    <a href="login.html" class="nav-btn" id="link-login">Connexion</a>
  </div>
</nav>

<div class="layout">
  <div class="page-header">
    <h1 class="page-title">Panel de recherche</h1>
    <p class="page-sub">Recherchez un profil par nom, email, téléphone, adresse ou identifiant unique.</p>
  </div>

  <div class="panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('adv',this)">Recherche avancée</button>
      <button class="ptab" onclick="switchTab('lookup',this)">Lookup direct</button>
    </div>
    <div class="panel-body">

      <!-- RECHERCHE AVANCÉE -->
      <div id="pane-adv">
        <div class="fg">
          <div class="fgroup"><label>Nom de famille</label><input id="s-nom" type="text" placeholder="Dupont"></div>
          <div class="fgroup"><label>Prénom</label><input id="s-prenom" type="text" placeholder="Jean"></div>
          <div class="fgroup"><label>Email</label><input id="s-email" type="email" placeholder="jean@gmail.com"></div>
          <div class="fgroup"><label>Téléphone</label><input id="s-tel" type="text" placeholder="0612345678"></div>
          <div class="fgroup"><label>Adresse</label><input id="s-adresse" type="text" placeholder="12 rue de la Paix"></div>
          <div class="fgroup"><label>Ville</label><input id="s-ville" type="text" placeholder="Paris"></div>
          <div class="fgroup"><label>Code postal</label><input id="s-cp" type="text" placeholder="75001"></div>
          <div class="fgroup"><label>Pays</label><input id="s-pays" type="text" placeholder="FR"></div>
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="flexible" checked>
          <div class="tog"></div>
          <span class="tog-label">Recherche flexible activée</span>
        </label>
        <button class="btn-run" id="btn-search" onclick="doSearch()">
          Lancer la recherche
        </button>
      </div>

      <!-- LOOKUP -->
      <div id="pane-lookup" style="display:none">
        <div class="fg" style="grid-template-columns:1fr;margin-bottom:16px">
          <div class="fgroup">
            <label>Email, téléphone ou IBAN</label>
            <input id="l-val" type="text" placeholder="jean@gmail.com  /  0612345678  /  FR76...">
          </div>
        </div>
        <button class="btn-run" id="btn-lookup" onclick="doLookup()">
          Exécuter le lookup
        </button>
      </div>

      <div id="results"></div>
    </div>
  </div>
</div>

<script>
const API   = '';
const TOKEN = localStorage.getItem('token');
const USER  = JSON.parse(localStorage.getItem('user') || '{}');

// Afficher état auth dans la nav
if(TOKEN){
  document.getElementById('link-login').style.display = 'none';
  document.getElementById('link-dash').style.display  = 'inline';
  document.getElementById('credits-pill').style.display = 'flex';
  document.getElementById('free-left').textContent    = USER.free_left ?? '—';
  document.getElementById('paid-credits').textContent = USER.credits   ?? '—';
  // Rafraîchir depuis l'API
  fetch(`${API}/api/auth/me`, {headers:{Authorization:'Bearer '+TOKEN}})
    .then(r=>r.json()).then(d=>{
      document.getElementById('free-left').textContent    = d.free_left ?? 0;
      document.getElementById('paid-credits').textContent = d.credits   ?? 0;
    }).catch(()=>{});
}

function hdr(){return {Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'}}
function g(id){return document.getElementById(id)}

function notif(msg,type='ok'){
  const el=document.createElement('div');el.className=`notif ${type}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}

function switchTab(t, btn){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  g('pane-adv').style.display    = t==='adv'    ? 'block' : 'none';
  g('pane-lookup').style.display = t==='lookup' ? 'block' : 'none';
  g('results').innerHTML = '';
}

function setLoading(id, on, label){
  const b = g(id); b.disabled = on;
  b.innerHTML = on
    ? '<div class="spinner"></div> Recherche en cours...'
    : label;
}

function updateCredits(free_left, credits){
  g('free-left').textContent    = free_left;
  g('paid-credits').textContent = credits;
  localStorage.setItem('user', JSON.stringify({...USER, free_left, credits}));
}

function renderResults(results, total, took, free_left, credits){
  updateCredits(free_left, credits);
  const el = g('results');
  if(!results.length){
    el.innerHTML = `<div class="empty-state">
      <span class="empty-icon">🔍</span>
      <div class="empty-title">Aucun résultat</div>
      <div class="empty-sub">Essayez avec moins de critères ou activez la recherche flexible.</div>
    </div>`;
    return;
  }
  let html = `<div class="res-bar">
    <span><strong>${total.toLocaleString()}</strong> résultat(s) — ${results.length} affiché(s)</span>
    <span>${took}ms</span>
  </div>`;
  results.slice(0,8).forEach((p,i)=>{
    const conf = p._confidence || 0;
    const cls  = conf>=70 ? 'hi' : conf>=40 ? 'md' : 'lo';
    const name = [p.prenom, p.nom_famille].filter(Boolean).join(' ') || 'Profil inconnu';
    const sub  = [p.email, p.telephone, p.ville].filter(Boolean).join(' · ') || '—';
    const fmap = [
      ['Nom',p.nom_famille],['Prénom',p.prenom],['Email',p.email],
      ['Téléphone',p.telephone],['Mobile',p.mobile],['Adresse',p.adresse],
      ['Code postal',p.code_postal],['Ville',p.ville],['Région',p.region],
      ['Pays',p.pays],['Naissance',p.date_naissance],['Genre',p.genre],
      ['Société',p.societe],['Profession',p.profession],
      ['NIR',p.nir],['IBAN',p.iban],['SIRET',p.siret],
    ].filter(([,v])=>v);
    const fh = fmap.map(([k,v])=>`<div class="rf"><div class="rf-k">${k}</div><div class="rf-v">${v}</div></div>`).join('');
    const sh = (p._sources||[]).map(s=>`<span class="src">${s}</span>`).join('');
    html += `<div class="rcard" style="animation-delay:${i*0.05}s">
      <div class="rcard-top" onclick="tog(${i})">
        <div>
          <div class="rname">${name}</div>
          <div class="rmeta">${sub}</div>
        </div>
        <div class="rtop-right">
          <span class="badge ${cls}">${conf}%</span>
          <span class="rarr" id="arr${i}">↓</span>
        </div>
      </div>
      <div class="rcard-body" id="rb${i}">
        <div class="rfields">${fh}</div>
        ${sh ? `<div class="rsources">${sh}</div>` : ''}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function tog(i){
  const b=g('rb'+i), a=g('arr'+i);
  b.classList.toggle('open');
  a.style.transform = b.classList.contains('open') ? 'rotate(180deg)' : 'none';
}

function showErr(msg){
  g('results').innerHTML = `<div class="err-box">⚠ ${msg}</div>`;
}

function showNoCredits(){
  g('results').innerHTML = `<div class="no-credits-box">
    <h3>Plus de crédits 💸</h3>
    <p>Vous avez utilisé toutes vos recherches gratuites.<br>Rechargez votre compte pour continuer.</p>
    <a href="dashboard.html" class="btn-credits">Acheter des crédits</a>
  </div>`;
}

function checkAuth(){
  if(!TOKEN){
    g('results').innerHTML = `<div class="no-credits-box">
      <h3>Connexion requise</h3>
      <p>Créez un compte gratuit pour accéder aux 10 recherches offertes.</p>
      <a href="login.html" class="btn-credits">Se connecter</a>
    </div>`;
    return false;
  }
  return true;
}

async function doSearch(){
  if(!checkAuth()) return;
  const payload = {flexible: g('flexible').checked};
  const map = {
    nom_famille:'s-nom', prenom:'s-prenom', email:'s-email',
    telephone:'s-tel', adresse:'s-adresse', ville:'s-ville',
    code_postal:'s-cp', pays:'s-pays'
  };
  Object.entries(map).forEach(([k,id])=>{const v=g(id).value.trim(); if(v) payload[k]=v});
  if(Object.keys(payload).length <= 1){showErr('Remplissez au moins un champ.'); return}
  setLoading('btn-search', true, 'Lancer la recherche');
  g('results').innerHTML = '';
  try{
    const r = await fetch(`${API}/api/search`, {method:'POST', headers:hdr(), body:JSON.stringify(payload)});
    const d = await r.json();
    if(r.status === 402){showNoCredits(); return}
    if(!r.ok){showErr(d.detail || 'Erreur API'); return}
    renderResults(d.results, d.total, d.took_ms, d.free_left, d.credits);
  }catch(e){showErr('Erreur réseau : '+e.message)}
  finally{setLoading('btn-search', false, 'Lancer la recherche')}
}

async function doLookup(){
  if(!checkAuth()) return;
  const val = g('l-val').value.trim();
  if(!val){showErr('Entrez un identifiant.'); return}
  setLoading('btn-lookup', true, 'Exécuter le lookup');
  g('results').innerHTML = '';
  try{
    const r = await fetch(`${API}/api/lookup`, {method:'POST', headers:hdr(), body:JSON.stringify({value:val})});
    const d = await r.json();
    if(r.status === 402){showNoCredits(); return}
    if(!r.ok){showErr(d.detail || 'Erreur API'); return}
    renderResults(d.results, d.total, 0, d.free_left, d.credits);
  }catch(e){showErr('Erreur réseau : '+e.message)}
  finally{setLoading('btn-lookup', false, 'Exécuter le lookup')}
}

// Touche Entrée
document.addEventListener('keydown', e=>{
  if(e.key !== 'Enter') return;
  if(g('pane-adv').style.display !== 'none') doSearch();
  else doLookup();
});

// Message retour paiement
const params = new URLSearchParams(window.location.search);
if(params.get('payment')==='success') notif('Paiement réussi ! Crédits ajoutés 🎉');
if(params.get('payment')==='cancel')  notif('Paiement annulé.', 'err');
</script>
</body>
</html>
