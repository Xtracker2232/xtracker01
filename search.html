<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recherche — Xtracker</title>
<meta property="og:image" content="https://www.xtracker.digital/preview.png">
<link rel="icon" type="image/png" href="/preview.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#171717;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.20);
  --text:#f0f0f0;--muted:#4a4a4a;--muted2:#7a7a7a;
  --accent:#d0d0d0;--accent2:#ffffff;--violet:#a0a0a0;
}
html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:inherit;text-decoration:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 15% 15%,rgba(255,255,255,0.02),transparent 60%)}

nav{padding:0 40px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.97);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--muted2)}
.nav-right{display:flex;align-items:center;gap:10px}
.btn-nav{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-accent{background:#fff;color:#0a0a0a;border:1px solid #fff;font-weight:700}
.btn-accent:hover{background:rgba(255,255,255,0.88)}

.wrap{max-width:960px;margin:0 auto;padding:32px 24px;position:relative;z-index:10}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px}
.page-sub{font-size:13px;color:var(--muted2);margin-bottom:28px;font-weight:300}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted2);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:#fff;border-bottom-color:#fff}

.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}

/* Sections dans le panel */
.field-section{margin-bottom:20px}
.field-section:last-child{margin-bottom:0}
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  margin-bottom:12px;
  cursor:pointer;
  user-select:none;
  transition:border-color .2s;
}
.section-header:hover{border-color:var(--border2)}
.section-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:8px}
.section-cnt{font-size:9px;font-weight:700;color:#fff;background:rgba(255,255,255,0.15);padding:1px 6px;border-radius:3px;display:none}
.section-arrow{color:var(--muted2);font-size:9px;transition:transform .2s}
.section-open .section-arrow{transform:rotate(180deg)}
.section-body{display:none}
.section-open .section-body{display:block}

.acc{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--bg2)}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
.acc-head:hover{background:rgba(255,255,255,0.03)}
.acc-left{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.3px;text-transform:uppercase}
.acc-cnt{font-size:9px;font-weight:700;color:#fff;background:rgba(255,255,255,0.15);padding:1px 6px;border-radius:3px;display:none}
.acc-arrow{color:var(--muted2);font-size:10px;transition:transform .2s}
.acc.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:12px 14px 16px}
.acc.open .acc-body{display:block}

.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg1{grid-template-columns:1fr}
.fgroup{display:flex;flex-direction:column;gap:5px}
.fgroup.full{grid-column:1/-1}
label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase;display:block}
input,select{
  background:#151515;
  border:1px solid rgba(255,255,255,0.14);
  border-radius:8px;padding:9px 12px;
  font-size:13px;color:var(--text);font-family:inherit;
  outline:none;width:100%;transition:all .2s;
  height:40px;
}
input:focus,select:focus{
  border-color:rgba(255,255,255,0.42);
  background:#1d1d1d;
  box-shadow:0 0 0 3px rgba(255,255,255,0.04);
}
input::placeholder{color:rgba(255,255,255,0.22);font-size:12px}
select option{background:var(--bg2)}

.search-bar{display:flex;align-items:center;justify-content:space-between;padding-top:14px;margin-top:10px;border-top:1px solid var(--border)}
.flex-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.tog{width:32px;height:18px;background:rgba(255,255,255,0.12);border-radius:9px;position:relative;flex-shrink:0;transition:background .25s;border:1px solid var(--border2)}
.tog.on{background:#fff}
.tog::after{content:'';position:absolute;left:2px;top:2px;width:12px;height:12px;background:var(--bg);border-radius:50%;transition:left .25s}
.tog.on::after{left:16px;background:#0a0a0a}
.flex-label{font-size:12px;color:var(--muted2)}
.btns{display:flex;gap:8px}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
.btn-g:hover{border-color:rgba(255,255,255,0.3);color:var(--text)}
.btn-a{background:#fff;color:#0a0a0a;border:1px solid #fff;font-weight:700}
.btn-a:hover{background:rgba(255,255,255,0.88)}
.btn-a:disabled{opacity:.4;cursor:not-allowed}

.lookup-input{background:#151515;border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:11px 14px;font-size:13px;color:var(--text);font-family:inherit;outline:none;width:100%;margin-bottom:12px;transition:all .2s}
.lookup-input:focus{border-color:rgba(255,255,255,0.42);background:#1d1d1d}
.lookup-input::placeholder{color:var(--muted)}

.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.results-count{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff}
.results-meta{font-size:12px;color:var(--muted2)}

.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;animation:fadeIn .3s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rcard:hover{border-color:var(--border2)}
.rcard-top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.rname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;color:#fff}
.rmeta{font-size:12px;color:var(--muted2)}
.rtop-r{display:flex;align-items:center;gap:8px}
.src-tag{font-size:10px;font-weight:700;color:var(--muted2);background:rgba(255,255,255,0.06);border:1px solid var(--border2);padding:2px 8px;border-radius:4px}
.rarr{color:var(--muted2);font-size:10px;transition:transform .2s}
.rcard-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.rcard-body.open{display:block}
.rfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:14px 0 12px}
.rf{display:flex;flex-direction:column;gap:3px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.rf-k{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rf-v{font-size:13px;font-weight:500;word-break:break-all;color:var(--text2)}
.rsources{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.rsrc{font-size:11px;color:var(--muted2);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:2px 8px;border-radius:4px}
.famille-box{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:12px}
.famille-title{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.famille-member{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.famille-member:last-child{border-bottom:none}
.fam-name{font-weight:700;color:#fff}
.fam-lien{font-size:10px;font-weight:600;color:var(--muted2);background:rgba(255,255,255,0.06);padding:1px 7px;border-radius:4px;border:1px solid var(--border2)}
.fam-detail{font-size:11px;color:var(--muted2)}
.action-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.raw-btn{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text2);font-family:inherit;transition:all .15s;white-space:nowrap}
.raw-btn:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.10);color:#fff}
.raw-data{display:none;margin-top:10px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:10px;color:var(--muted2);white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto}

.state{text-align:center;padding:60px 20px}
.state-ico{font-size:36px;opacity:.2;margin-bottom:12px}
.state-title{font-size:15px;font-weight:600;color:var(--muted2)}
.state-sub{font-size:12px;color:var(--muted);margin-top:6px}
.err-box{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:14px;color:#f87171;font-size:13px}
.no-credits{text-align:center;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:12px}
.no-credits h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px}
.no-credits p{font-size:13px;color:var(--muted2);margin-bottom:16px}

.notif{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;animation:notifIn .3s ease;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,0.7)}
.notif.ok{background:#fff;color:#0a0a0a;border:1px solid rgba(255,255,255,0.3)}
.notif.err{background:#1a0a0a;color:#f87171;border:1px solid rgba(248,113,113,0.3)}
@keyframes notifIn{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}

@media(max-width:640px){
  nav{padding:0 16px}
  .wrap{padding:20px 16px}
  .fg{grid-template-columns:1fr}
  .rfields{grid-template-columns:1fr 1fr}
}
.famille-title{font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.famille-member{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fam-name{font-weight:600}
.fam-lien{color:var(--accent2);font-size:11px}
.fam-detail{color:var(--muted2);font-size:11px}
.action-row{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;gap:8px}
.raw-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted2);font-family:inherit;transition:all .15s}
.raw-btn:hover{border-color:var(--border2);color:var(--text)}
.raw-data{display:none;margin-top:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:var(--muted2);white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;line-height:1.5}

.state{text-align:center;padding:60px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
.state-ico{font-size:36px;margin-bottom:14px;opacity:.5}
.state-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.state-sub{font-size:13px;color:var(--muted2)}
.err-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:#fca5a5}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.notif{position:fixed;bottom:20px;right:20px;z-index:200;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:slideIn .3s ease;background:var(--bg2);border:1px solid var(--border);max-width:280px}
.notif.ok{border-color:rgba(34,197,94,.3);color:#86efac}
.notif.err{border-color:rgba(239,68,68,.3);color:#fca5a5}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
@media(max-width:680px){nav{padding:0 16px}.wrap{padding:24px 16px}.fg{grid-template-columns:1fr}.rfields{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">X<span>tracker</span></a>
  <div class="nav-right">
    <a href="https://discord.gg/bYSDCmgcRz" target="_blank" class="btn-nav btn-ghost">💬 Discord</a>
    <a href="login.html" class="btn-nav btn-accent">Connexion →</a>
  </div>
</nav>
<div class="wrap">
  <h1>Recherche publique</h1>
  <p class="page-sub">Testez notre moteur avec vos 5 recherches gratuites.</p>
  <div class="tabs">
    <button class="tab active" id="tab-fr" onclick="switchTab('fr',this)">Recherche FR</button>
    <button class="tab" id="tab-lookup" onclick="switchTab('lookup',this)">Lookup rapide</button>
  </div>
  <div id="pane-fr">
    <div class="panel">
      <div class="acc open" id="acc-id">
        <div class="acc-head" onclick="togAcc('id')"><div class="acc-left">👤 Identite <span class="acc-cnt" id="ac-id"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup"><label>Nom</label><input id="f-nom" placeholder="Bardella" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Prenom</label><input id="f-prenom" placeholder="Jordan" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Nom naissance</label><input id="f-nom_naissance" placeholder="Martin" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Genre</label><select id="f-genre" onchange="cnt('id')"><option value="">Tous</option><option value="M">M</option><option value="F">F</option></select></div>
        </div></div>
      </div>
      <div class="acc" id="acc-contact">
        <div class="acc-head" onclick="togAcc('contact')"><div class="acc-left">Email / Tel <span class="acc-cnt" id="ac-contact"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup"><label>Email</label><input id="f-email" type="email" placeholder="jordan@gmail.com" oninput="cnt('contact')"></div>
          <div class="fgroup"><label>Telephone</label><input id="f-telephone" placeholder="0612345678" oninput="cnt('contact')"></div>
        </div></div>
      </div>
      <div class="acc" id="acc-loc">
        <div class="acc-head" onclick="togAcc('loc')"><div class="acc-left">Localisation <span class="acc-cnt" id="ac-loc"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup full"><label>Adresse</label><input id="f-adresse" placeholder="10 rue de la Paix" oninput="cnt('loc')"></div>
          <div class="fgroup"><label>Code postal</label><input id="f-code_postal" placeholder="75001" oninput="cnt('loc')"></div>
          <div class="fgroup"><label>Ville</label><input id="f-ville" placeholder="Paris" oninput="cnt('loc')"></div>
        </div></div>
      </div>
      <div class="search-bar">
        <div class="flex-toggle" onclick="togFlex()">
          <div class="tog on" id="flex-tog"></div>
          <span class="flex-label">Flexible</span>
        </div>
        <div class="btns">
          <button class="btn btn-g" onclick="clearAll()">Effacer</button>
          <button class="btn btn-a" id="btn-search" onclick="doSearch()">Rechercher</button>
        </div>
      </div>
    </div>
  </div>
  <div id="pane-lookup" style="display:none">
    <div class="panel">
      <label style="display:block;margin-bottom:8px;font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase">Email, telephone ou IBAN</label>
      <input class="lookup-input" id="l-val" placeholder="jordan@gmail.com / 0612345678 / FR76...">
      <button class="btn btn-a" id="btn-lookup" onclick="doLookup()">Lookup</button>
    </div>
  </div>
  <div id="results-area">
    <div class="state" id="state-empty">
      <div class="state-ico">🔍</div>
      <div class="state-title">Pret a rechercher</div>
      <div class="state-sub">Remplissez au moins un champ et lancez la recherche.</div>
    </div>
  </div>
</div>
<script>
const API='';
const TOKEN=localStorage.getItem('token');
let flexible=true;
function g(id){return document.getElementById(id)}
function hdr(){const h={'Content-Type':'application/json'};if(TOKEN)h['Authorization']='Bearer '+TOKEN;return h}
function notif(msg,type){const el=document.createElement('div');el.className='notif '+(type||'ok');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  g('pane-fr').style.display=t==='fr'?'block':'none';
  g('pane-lookup').style.display=t==='lookup'?'block':'none';
  g('results-area').innerHTML='<div class="state"><div class="state-ico">🔍</div><div class="state-title">Pret a rechercher</div><div class="state-sub">Remplissez un champ et lancez la recherche.</div></div>';
}
function togAcc(id){g('acc-'+id).classList.toggle('open')}
function togFlex(){flexible=!flexible;g('flex-tog').classList.toggle('on',flexible)}
const acFields={id:['f-nom','f-prenom','f-nom_naissance','f-genre'],contact:['f-email','f-telephone'],loc:['f-adresse','f-code_postal','f-ville']};
function cnt(name){
  const n=(acFields[name]||[]).filter(id=>{const el=g(id);return el&&el.value.trim()}).length;
  const c=g('ac-'+name);if(c){c.textContent=n;c.style.display=n>0?'inline':'none'}
}
function clearAll(){
  ['f-nom','f-prenom','f-nom_naissance','f-genre','f-email','f-telephone','f-adresse','f-code_postal','f-ville'].forEach(id=>{const el=g(id);if(el){if(el.tagName==='SELECT')el.value='';else el.value=''}});
  ['id','contact','loc'].forEach(n=>cnt(n));
  g('results-area').innerHTML='<div class="state"><div class="state-ico">🔍</div><div class="state-title">Pret a rechercher</div><div class="state-sub">Remplissez au moins un champ.</div></div>';
}
const LABELS={nom_famille:'Nom',prenom:'Prenom',nom_naissance:'Nom naissance',nom_affichage:'Nom affiche',nom_utilisateur:'Utilisateur',genre:'Genre',date_naissance:'Naissance',annee_naissance:'Annee',ville_naissance:'Ville naiss.',email:'Email',telephone:'Telephone',mobile:'Mobile',adresse_ip:'IP',adresse:'Adresse',complement_adresse:'Complement',code_postal:'Code postal',ville:'Ville',pays:'Pays',region:'Region',departement:'Departement',nir:'NIR (Secu)',iban:'IBAN',bic:'BIC',siret:'SIRET',siren:'SIREN',vin_plaque:'VIN/Plaque',immatriculation:'Immat.',marque:'Marque',modele:'Modele',societe:'Societe',profession:'Profession',fonction:'Fonction'};
const SKIP=new Set(['_confidence','_sources','_es_ids','_source_files','famille','membres_famille','family','flexible','per_page']);
function renderResults(results,total,took){
  const area=g('results-area');
  if(!results.length){area.innerHTML='<div class="state"><div class="state-ico">😶</div><div class="state-title">Aucun resultat</div><div class="state-sub">Essayez avec moins de criteres.</div></div>';return}
  let html='<div class="results-header"><div class="results-count">'+total.toLocaleString()+' resultat'+(total>1?'s':'')+'</div><div class="results-meta">'+results.length+' affiche(s)'+(took?' · '+took+'ms':'')+'</div></div>';
  results.forEach((p,i)=>{
    window['_r'+i]=p;
    const name=[p.prenom,p.nom_famille].filter(Boolean).join(' ')||'Profil inconnu';
    const sub=[p.email,p.telephone,p.ville].filter(Boolean).join(' · ')||'—';
    const srcs=(p._sources||[]).slice(0,3).map(s=>'<span class="src-tag">'+s+'</span>').join('');
    const fmap=Object.entries(p).filter(([k,v])=>!SKIP.has(k)&&v&&typeof v==='string'&&v.trim()&&v!=='undefined').map(([k,v])=>[LABELS[k]||k,v]);
    const fh=fmap.map(([k,v])=>'<div class="rf"><div class="rf-k">'+k+'</div><div class="rf-v">'+v+'</div></div>').join('');
    const famille=p.famille||p.membres_famille||p.family||[];
    let famHtml='';
    if(famille.length){
      famHtml='<div class="famille-box"><div class="famille-title">Famille associee ('+famille.length+')</div>'+
        famille.map(m=>'<div class="famille-member"><span class="fam-name">'+(m.prenom||'')+' '+(m.nom_famille||'')+'</span>'+(m.lien?'<span class="fam-lien">'+m.lien+'</span>':'')+(m.date_naissance?'<span class="fam-detail">'+m.date_naissance+'</span>':'')+(m.email?'<span class="fam-detail">'+m.email+'</span>':'')+(m.telephone?'<span class="fam-detail">'+m.telephone+'</span>':'')+'</div>').join('')+'</div>';
    }
    const allSrcs=(p._sources||[]).map(s=>'<span class="rsrc">'+s+'</span>').join('');
    const rawStr=JSON.stringify(p,null,2).replace(/</g,'&lt;');
    html+='<div class="rcard" style="animation-delay:'+i*.04+'s"><div class="rcard-top" onclick="tog('+i+')"><div><div class="rname">'+name+'</div><div class="rmeta">'+sub+'</div></div><div class="rtop-r">'+srcs+'<span class="rarr" id="arr'+i+'">▼</span></div></div><div class="rcard-body" id="rb'+i+'"><div class="rfields">'+fh+'</div>'+(allSrcs?'<div class="rsources">'+allSrcs+'</div>':'')+famHtml+'<div class="action-row"><button class="raw-btn" onclick="toggleRaw('+i+')">Approfondir</button><button class="raw-btn" onclick="copyResult('+i+')">Copier</button></div><div class="raw-data" id="raw'+i+'">'+rawStr+'</div></div></div>';
  });
  area.innerHTML=html;
}
function tog(i){const b=g('rb'+i),a=g('arr'+i);b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'rotate(180deg)':'none'}
function toggleRaw(i){const el=g('raw'+i);el.style.display=el.style.display==='block'?'none':'block'}
function copyResult(i){
  const p=window['_r'+i];if(!p)return;
  const lines=Object.entries(p).filter(([k,v])=>!SKIP.has(k)&&v&&typeof v==='string'&&v.trim()).map(([k,v])=>(LABELS[k]||k)+': '+v);
  const fam=p.famille||[];
  if(fam.length){lines.push('--- Famille ---');fam.forEach(m=>lines.push([m.prenom,m.nom_famille,m.lien,m.date_naissance].filter(Boolean).join(' | ')))}
  navigator.clipboard.writeText(lines.join('\n')).then(()=>notif('Copie!','ok')).catch(()=>notif('Erreur copie','err'));
}
function setLoad(id,on,label){const b=g(id);if(!b)return;b.disabled=on;b.innerHTML=on?'<span class="spinner"></span>Recherche...':label}
async function doSearch(){
  const payload={flexible,per_page:100};
  const map={nom_famille:'f-nom',prenom:'f-prenom',nom_naissance:'f-nom_naissance',genre:'f-genre',email:'f-email',telephone:'f-telephone',adresse:'f-adresse',code_postal:'f-code_postal',ville:'f-ville'};
  Object.entries(map).forEach(([k,id])=>{const v=g(id)&&g(id).value.trim();if(v)payload[k]=v});
  if(Object.keys(payload).length<=2){g('results-area').innerHTML='<div class="err-box">Remplissez au moins un champ.</div>';return}
  setLoad('btn-search',true,'Rechercher');
  try{
    const r=await fetch(API+'/api/search',{method:'POST',headers:hdr(),body:JSON.stringify(payload)});
    const d=await r.json();
    if(r.status===402){g('results-area').innerHTML='<div class="state"><div class="state-ico">💸</div><div class="state-title">Plus de credits</div><div class="state-sub"><a href="login.html" style="color:var(--accent2)">Connectez-vous</a> pour recharger.</div></div>';return}
    if(d.protected){g('results-area').innerHTML='<div class="state"><div class="state-ico">😏</div><div class="state-title">'+d.message+'</div></div>';return}
    if(!r.ok){g('results-area').innerHTML='<div class="err-box">'+(d.detail||'Erreur API')+'</div>';return}
    renderResults(d.results,d.total,d.took_ms);
  }catch(e){g('results-area').innerHTML='<div class="err-box">Erreur reseau : '+e.message+'</div>'}
  finally{setLoad('btn-search',false,'Rechercher')}
}
async function doLookup(){
  const val=g('l-val')&&g('l-val').value.trim();
  if(!val){g('results-area').innerHTML='<div class="err-box">Entrez un identifiant.</div>';return}
  setLoad('btn-lookup',true,'Lookup');
  try{
    const r=await fetch(API+'/api/lookup',{method:'POST',headers:hdr(),body:JSON.stringify({value:val})});
    const d=await r.json();
    if(r.status===402){g('results-area').innerHTML='<div class="state"><div class="state-ico">💸</div><div class="state-title">Plus de credits</div></div>';return}
    if(!r.ok){g('results-area').innerHTML='<div class="err-box">'+(d.detail||'Erreur')+'</div>';return}
    renderResults(d.results,d.total,0);
  }catch(e){g('results-area').innerHTML='<div class="err-box">Erreur reseau</div>'}
  finally{setLoad('btn-lookup',false,'Lookup')}
}
</script>
