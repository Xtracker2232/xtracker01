<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche — Xtracker</title>
<meta property="og:image" content="https://www.xtracker.digital/preview.png">
<link rel="icon" type="image/png" href="/preview.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--bg2:#0a0d1a;--bg3:#0d1020;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#f0f2ff;--muted:#4a5280;--muted2:#8892c0;
  --accent:#6366f1;--accent2:#818cf8;--violet:#a78bfa;
}
html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:inherit;text-decoration:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 20% 20%,rgba(99,102,241,0.06),transparent 60%)}

nav{padding:0 40px;height:58px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(6,8,15,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.logo{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btn{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.nav-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted2)}
.nav-btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.nav-btn-accent{background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff}

.wrap{max-width:1000px;margin:0 auto;padding:32px 24px;position:relative;z-index:10}

h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px}
.page-sub{font-size:14px;color:var(--muted2);margin-bottom:28px;font-weight:300}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;gap:0}
.tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--muted2);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}

/* ACCORDEONS */
.acc{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--bg3)}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .15s}
.acc-head:hover{background:rgba(255,255,255,0.03)}
.acc-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text)}
.acc-cnt{font-size:10px;font-weight:700;color:var(--accent2);background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.2);padding:1px 6px;border-radius:4px;display:none}
.acc-arrow{color:var(--muted);font-size:10px;transition:transform .2s}
.acc.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:12px 16px 16px}
.acc.open .acc-body{display:block}

/* FIELDS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fg1{grid-template-columns:1fr}
.fgroup{display:flex;flex-direction:column;gap:4px}
.fgroup.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase}
input,select{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;width:100%;transition:all .2s}
input:focus,select:focus{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.05)}
input::placeholder{color:var(--muted);font-size:12px}
select option{background:var(--bg2)}

/* SEARCH BAR */
.search-bar{display:flex;align-items:center;justify-content:space-between;padding-top:16px;margin-top:8px;border-top:1px solid var(--border)}
.flex-toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.tog-wrap{width:36px;height:20px;background:var(--muted);border-radius:10px;position:relative;flex-shrink:0;transition:background .25s}
.tog-wrap.on{background:linear-gradient(135deg,var(--accent),var(--violet))}
.tog-wrap::after{content:'';position:absolute;left:3px;top:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .25s}
.tog-wrap.on::after{left:19px}
input[type=checkbox]{display:none}
.flex-label{font-size:12px;color:var(--muted2)}
.btns{display:flex;gap:8px}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;box-shadow:0 3px 14px rgba(99,102,241,0.3)}
.btn-accent:hover{box-shadow:0 6px 20px rgba(99,102,241,0.4);transform:translateY(-1px)}
.btn-accent:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* LOOKUP */
.lookup-wrap{display:flex;flex-direction:column;gap:12px}
.lookup-label{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.lookup-input{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;width:100%;transition:all .2s}
.lookup-input:focus{border-color:rgba(99,102,241,0.5)}
.lookup-input::placeholder{color:var(--muted);font-size:13px}

/* RESULTS */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.results-meta{font-size:12px;color:var(--muted2)}

.rcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;animation:fadeIn .3s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.rcard:hover{border-color:rgba(99,102,241,0.2)}
.rcard-top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.rname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.rmeta{font-size:12px;color:var(--muted2)}
.rtop-right{display:flex;align-items:center;gap:8px}
.src{font-size:10px;font-weight:600;color:var(--accent2);background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);padding:2px 8px;border-radius:4px}
.rarr{color:var(--muted);font-size:10px;transition:transform .2s}
.rcard-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.rcard-body.open{display:block}
.rfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin:14px 0 12px}
.rf{display:flex;flex-direction:column;gap:3px}
.rf-k{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.rf-v{font-size:13px;color:var(--text);font-weight:500;word-break:break-all}
.rsources{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.rsrc{font-size:11px;color:var(--muted2);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:2px 8px;border-radius:4px}

/* FAMILLE */
.famille-box{background:rgba(99,102,241,0.05);border:1px solid rgba(99,102,241,0.1);border-radius:8px;padding:12px 14px;margin-bottom:12px}
.famille-title{font-size:10px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.famille-member{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fam-name{font-weight:600;color:var(--text)}
.fam-lien{color:var(--accent2);font-size:11px}
.fam-detail{color:var(--muted2);font-size:11px}

/* RAW */
.raw-btn{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted2);font-family:inherit;transition:all .15s;margin-right:6px}
.raw-btn:hover{border-color:var(--border2);color:var(--text)}
.raw-data{display:none;margin-top:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:var(--muted2);white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;line-height:1.5}

/* STATE */
.state{text-align:center;padding:60px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
.state-ico{font-size:36px;margin-bottom:14px;opacity:.5}
.state-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.state-sub{font-size:13px;color:var(--muted2)}

/* SPINNER */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERR */
.err-box{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:#fca5a5}

/* NOTIF */
.notif{position:fixed;bottom:20px;right:20px;z-index:200;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:slideIn .3s ease;background:var(--bg2);border:1px solid var(--border);max-width:280px}
.notif.ok{border-color:rgba(34,197,94,.3);color:#86efac}
.notif.err{border-color:rgba(239,68,68,.3);color:#fca5a5}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}

@media(max-width:680px){
  nav{padding:0 16px}
  .wrap{padding:24px 16px}
  .fg,.fg3{grid-template-columns:1fr}
  .rfields{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">X<span>tracker</span></a>
  <div class="nav-right">
    <a href="https://discord.gg/bYSDCmgcRz" target="_blank" class="nav-btn nav-btn-ghost">💬 Discord</a>
    <a href="login.html" class="nav-btn nav-btn-accent">Connexion →</a>
  </div>
</nav>

<div class="wrap">
  <h1>Recherche publique</h1>
  <p class="page-sub">Testez notre moteur de recherche avec vos 5 recherches gratuites.</p>

  <div class="tabs">
    <button class="tab active" id="tab-fr" onclick="switchTab('fr',this)">Recherche FR</button>
    <button class="tab" id="tab-lookup" onclick="switchTab('lookup',this)">Lookup rapide</button>
  </div>

  <!-- TAB FR -->
  <div id="pane-fr">
    <div class="panel">
      <div class="acc open" id="acc-id"><div class="acc-head" onclick="togAcc('id')"><div class="acc-left"><span>👤</span> Identité <span class="acc-cnt" id="ac-id"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup"><label>Nom</label><input id="f-nom" placeholder="Dupont" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Prénom</label><input id="f-prenom" placeholder="Jean" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Nom naissance</label><input id="f-nom_naissance" placeholder="Martin" oninput="cnt('id')"></div>
          <div class="fgroup"><label>Genre</label><select id="f-genre" onchange="cnt('id')"><option value="">Tous</option><option value="M">M</option><option value="F">F</option></select></div>
        </div></div>
      </div>
      <div class="acc" id="acc-contact"><div class="acc-head" onclick="togAcc('contact')"><div class="acc-left"><span>✉️</span> Contact <span class="acc-cnt" id="ac-contact"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup"><label>Email</label><input id="f-email" type="email" placeholder="jean@gmail.com" oninput="cnt('contact')"></div>
          <div class="fgroup"><label>Téléphone</label><input id="f-telephone" placeholder="0612345678" oninput="cnt('contact')"></div>
        </div></div>
      </div>
      <div class="acc" id="acc-loc"><div class="acc-head" onclick="togAcc('loc')"><div class="acc-left"><span>📍</span> Localisation <span class="acc-cnt" id="ac-loc"></span></div><span class="acc-arrow">▼</span></div>
        <div class="acc-body"><div class="fg">
          <div class="fgroup full"><label>Adresse</label><input id="f-adresse" placeholder="10 rue de la Paix" oninput="cnt('loc')"></div>
          <div class="fgroup"><label>Code postal</label><input id="f-code_postal" placeholder="75001" oninput="cnt('loc')"></div>
          <div class="fgroup"><label>Ville</label><input id="f-ville" placeholder="Paris" oninput="cnt('loc')"></div>
        </div></div>
      </div>
      <div class="search-bar">
        <label class="flex-toggle" onclick="togFlex()">
          <div class="tog-wrap" id="flex-tog"></div>
          <span class="flex-label">Flexible</span>
        </label>
        <div class="btns">
          <button class="btn btn-ghost" onclick="clearAll()">Effacer</button>
          <button class="btn btn-accent" id="btn-search" onclick="doSearch()">Rechercher</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB LOOKUP -->
  <div id="pane-lookup" style="display:none">
    <div class="panel">
      <div class="lookup-wrap">
        <div><div class="lookup-label">Email, téléphone ou IBAN</div><input class="lookup-input" id="l-val" placeholder="jean@gmail.com / 0612345678 / FR76..."></div>
        <button class="btn btn-accent" id="btn-lookup" onclick="doLookup()" style="align-self:flex-start">Lookup →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-area">
    <div class="state" id="state-empty">
      <div class="state-ico">🔍</div>
      <div class="state-title">Prêt à rechercher</div>
      <div class="state-sub">Remplissez au moins un champ et lancez la recherche.</div>
    </div>
  </div>

</div>

<script>
const API='';
const TOKEN=localStorage.getItem('token');
let flexible=true;

function g(id){return document.getElementById(id)}
function hdr(){const h={'Content-Type':'application/json'};if(TOKEN)h['Authorization']='Bearer '+TOKEN;return h}

function notif(msg,type='ok'){
  const el=document.createElement('div');el.className=`notif ${type}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  g('pane-fr').style.display=t==='fr'?'block':'none';
  g('pane-lookup').style.display=t==='lookup'?'block':'none';
  g('results-area').innerHTML='<div class="state" id="state-empty"><div class="state-ico">🔍</div><div class="state-title">Prêt à rechercher</div><div class="state-sub">Remplissez un champ et lancez la recherche.</div></div>';
}

function togAcc(id){const a=g('acc-'+id);a.classList.toggle('open')}

function togFlex(){
  flexible=!flexible;
  g('flex-tog').classList.toggle('on',flexible);
}

const acFields={
  id:['f-nom','f-prenom','f-nom_naissance','f-genre'],
  contact:['f-email','f-telephone'],
  loc:['f-adresse','f-code_postal','f-ville'],
};
function cnt(name){
  const n=(acFields[name]||[]).filter(id=>{const el=g(id);return el&&el.value.trim()}).length;
  const c=g('ac-'+name);if(c){c.textContent=n;c.style.display=n>0?'inline':'none'}
}
function clearAll(){
  ['f-nom','f-prenom','f-nom_naissance','f-genre','f-email','f-telephone','f-adresse','f-code_postal','f-ville'].forEach(id=>{const el=g(id);if(el)el.tagName==='SELECT'?el.value='':el.value=''});
  ['id','contact','loc'].forEach(n=>cnt(n));
  g('results-area').innerHTML='<div class="state" id="state-empty"><div class="state-ico">🔍</div><div class="state-title">Prêt à rechercher</div><div class="state-sub">Remplissez au moins un champ et lancez la recherche.</div></div>';
}

const LABELS={nom_famille:'Nom',prenom:'Prénom',nom_naissance:'Nom naissance',nom_affichage:'Nom affiché',nom_utilisateur:'Utilisateur',genre:'Genre',date_naissance:'Naissance',annee_naissance:'Année',ville_naissance:'Ville naiss.',email:'Email',telephone:'Téléphone',mobile:'Mobile',adresse_ip:'IP',adresse:'Adresse',complement_adresse:'Complément',code_postal:'Code postal',ville:'Ville',pays:'Pays',region:'Région',departement:'Département',nir:'NIR (Sécu)',iban:'IBAN',bic:'BIC',siret:'SIRET',siren:'SIREN',vin_plaque:'VIN/Plaque',immatriculation:'Immat.',marque:'Marque',modele:'Modèle',societe:'Société',profession:'Profession',fonction:'Fonction'};
const SKIP=new Set(['_confidence','_sources','_es_ids','_source_files','famille','membres_famille','family','flexible','per_page']);

function renderResults(results,total,took){
  const area=g('results-area');
  if(!results.length){area.innerHTML='<div class="state"><div class="state-ico">😶</div><div class="state-title">Aucun résultat</div><div class="state-sub">Essayez avec moins de critères.</div></div>';return}
  let html=`<div class="results-header"><div class="results-count">${total.toLocaleString()} résultat${total>1?'s':''}</div><div class="results-meta">${results.length} affiché(s)${took?' · '+took+'ms':''}</div></div>`;
  results.forEach((p,i)=>{
    window[`_r${i}`]=p;
    const name=[p.prenom,p.nom_famille].filter(Boolean).join(' ')||'Profil inconnu';
    const sub=[p.email,p.telephone,p.ville].filter(Boolean).join(' · ')||'—';
    const srcs=(p._sources||[]).slice(0,3).map(s=>`<span class="src">${s}</span>`).join('');
    const fmap=Object.entries(p).filter(([k,v])=>!SKIP.has(k)&&v&&typeof v==='string'&&v.trim()&&v!=='undefined').map(([k,v])=>[LABELS[k]||k,v]);
    const fh=fmap.map(([k,v])=>`<div class="rf"><div class="rf-k">${k}</div><div class="rf-v">${v}</div></div>`).join('');
    const famille=p.famille||p.membres_famille||p.family||[];
    let famHtml='';
    if(famille.length){
      famHtml=`<div class="famille-box"><div class="famille-title">👨‍👩‍👧 Famille associée (${famille.length})</div>${famille.map(m=>`<div class="famille-member"><span class="fam-name">${[m.prenom,m.nom_famille].filter(Boolean).join(' ')||'—'}</span>${m.lien?`<span class="fam-lien">${m.lien}</span>`:''} ${m.date_naissance?`<span class="fam-detail">${m.date_naissance}</span>`:''} ${m.email?`<span class="fam-detail">${m.email}</span>`:''} ${m.telephone?`<span class="fam-detail">${m.telephone}</span>`:''}</div>`).join('')}</div>`;
    }
    const allSrcs=(p._sources||[]).map(s=>`<span class="rsrc">${s}</span>`).join('');
    html+=`<div class="rcard" style="animation-delay:${i*.04}s">
      <div class="rcard-top" onclick="tog(${i})">
        <div><div class="rname">${name}</div><div class="rmeta">${sub}</div></div>
        <div class="rtop-right">${srcs}<span class="rarr" id="arr${i}">▼</span></div>
      </div>
      <div class="rcard-body" id="rb${i}">
        <div class="rfields">${fh||'<div style="color:var(--muted);font-size:13px">Aucun champ disponible</div>'}</div>
        ${allSrcs?`<div class="rsources">${allSrcs}</div>`:''}
        ${famHtml}
        <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;gap:8px">
          <button class="raw-btn" onclick="toggleRaw(${i})">🔍 Approfondir</button>
          <button class="raw-btn" onclick="copyResult(${i})">📋 Copier</button>
        </div>
        <div class="raw-data" id="raw${i}">${JSON.stringify(p,null,2).replace(/</g,'&lt;')}</div>
      </div>
    </div>`;
  });
  area.innerHTML=html;
}

function tog(i){const b=g('rb'+i),a=g('arr'+i);b.classList.toggle('open');a.style.transform=b.classList.contains('open')?'rotate(180deg)':'none'}
function toggleRaw(i){const el=g('raw'+i);el.style.display=el.style.display==='block'?'none':'block'}
function copyResult(i){
  const p=window[`_r${i}`];if(!p)return;
  const lines=Object.entries(p).filter(([k,v])=>!SKIP.has(k)&&v&&typeof v==='string'&&v.trim()).map(([k,v])=>`${LABELS[k]||k}: ${v}`);
  const famille=p.famille||[];
  if(famille.length){lines.push('--- Famille ---');famille.forEach(m=>lines.push([m.prenom,m.nom_famille,m.lien,m.date_naissance].filter(Boolean).join(' | ')))}
  navigator.clipboard.writeText(lines.join('\n')).then(()=>notif('Copié 📋')).catch(()=>notif('Erreur copie','err'));
}

function setLoad(id,on,label){const b=g(id);if(!b)return;b.disabled=on;b.innerHTML=on?`<span class="spinner"></span>Recherche...`:label}

async function doSearch(){
  const payload={flexible,per_page:100};
  const map={nom_famille:'f-nom',prenom:'f-prenom',nom_naissance:'f-nom_naissance',genre:'f-genre',email:'f-email',telephone:'f-telephone',adresse:'f-adresse',code_postal:'f-code_postal',ville:'f-ville'};
  Object.entries(map).forEach(([k,id])=>{const v=g(id)?.value?.trim();if(v)payload[k]=v});
  if(Object.keys(payload).length<=2){g('results-area').innerHTML='<div class="err-box">Remplissez au moins un champ.</div>';return}
  setLoad('btn-search',true,'Rechercher');
  try{
    const r=await fetch(`${API}/api/search`,{method:'POST',headers:hdr(),body:JSON.stringify(payload)});
    const d=await r.json();
    if(r.status===402){g('results-area').innerHTML='<div class="state"><div class="state-ico">💸</div><div class="state-title">Plus de crédits</div><div class="state-sub"><a href="login.html" style="color:var(--accent2)">Connectez-vous</a> pour recharger.</div></div>';return}
    if(d.protected){g('results-area').innerHTML=`<div class="state"><div class="state-ico">😏</div><div class="state-title">${d.message}</div></div>`;return}
    if(!r.ok){g('results-area').innerHTML=`<div class="err-box">${d.detail||'Erreur API'}</div>`;return}
    renderResults(d.results,d.total,d.took_ms);
  }catch(e){g('results-area').innerHTML=`<div class="err-box">Erreur réseau : ${e.message}</div>`}
  finally{setLoad('btn-search',false,'Rechercher')}
}

async function doLookup(){
  const val=g('l-val')?.value?.trim();
  if(!val){g('results-area').innerHTML='<div class="err-box">Entrez un identifiant.</div>';return}
  setLoad('btn-lookup',true,'Lookup');
  try{
    const r=await fetch(`${API}/api/lookup`,{method:'POST',headers:hdr(),body:JSON.stringify({value:val})});
    const d=await r.json();
    if(r.status===402){g('results-area').innerHTML='<div class="state"><div class="state-ico">💸</div><div class="state-title">Plus de crédits</div><div class="state-sub"><a href="login.html" style="color:var(--accent2)">Connectez-vous</a> pour recharger.</div></div>';return}
    if(!r.ok){g('results-area').innerHTML=`<div class="err-box">${d.detail||'Erreur'}</div>`;return}
    renderResults(d.results,d.total,0);
  }catch(e){g('results-area').innerHTML=`<div class="err-box">Erreur réseau</div>`}
  finally{setLoad('btn-lookup',false,'Lookup →')}
}

// Init flex toggle
g('flex-tog').classList.add('on');
</script>
