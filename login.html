<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Xtracker</title>
<meta property="og:image" content="https://www.xtracker.digital/preview.png">
<link rel="icon" type="image/png" href="/preview.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080f;--bg2:#0a0d1a;--border:rgba(255,255,255,0.06);--text:#f0f2ff;--muted:#4a5280;--muted2:#8892c0;--accent:#6366f1;--accent2:#818cf8;--violet:#a78bfa}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:inherit;text-decoration:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(99,102,241,0.07),transparent 70%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(167,139,250,0.06),transparent 60%)}
nav{padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(6,8,15,0.9);backdrop-filter:blur(20px);position:relative;z-index:10}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.nav-link{font-size:13px;color:var(--muted2);transition:color .2s}
.nav-link:hover{color:var(--text)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:calc(100vh - 60px);position:relative;z-index:10}
.card{width:100%;max-width:420px;background:rgba(10,13,26,0.8);border:1px solid var(--border);border-radius:16px;padding:40px;backdrop-filter:blur(20px);animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:1px;color:var(--accent2);background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);padding:4px 12px;border-radius:20px;margin-bottom:24px;text-transform:uppercase}
.card-badge i{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px}
.card-sub{font-size:14px;color:var(--muted2);margin-bottom:32px;font-weight:300}
.tabs{display:flex;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:28px}
.tab{flex:1;padding:8px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--muted2);border-radius:6px;cursor:pointer;transition:all .2s;font-family:inherit}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,0.4)}
.fgroup{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:500;color:var(--muted2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:all .2s}
input:focus{border-color:rgba(99,102,241,0.6);background:rgba(99,102,241,0.06);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
input::placeholder{color:var(--muted);font-size:13px}
.btn{width:100%;padding:13px;margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--violet));color:#fff;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .25s;box-shadow:0 4px 20px rgba(99,102,241,0.3)}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(99,102,241,0.4)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
.ok{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--accent2);margin-bottom:16px;display:none}
.free-note{text-align:center;margin-top:16px;font-size:12px;color:var(--muted2);padding:10px;border:1px solid var(--border);border-radius:8px;background:rgba(99,102,241,0.04)}
.free-note strong{color:var(--accent2)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:20px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);position:relative;z-index:10}
footer a{color:var(--muted2)}
</style>
</head>
<body style="display:flex;flex-direction:column">
<nav>
  <a href="index.html" class="logo">X<span>tracker</span></a>
  <div style="display:flex;gap:12px">
    <a href="https://discord.gg/bYSDCmgcRz" target="_blank" class="nav-link">Discord</a>
    <a href="index.html" class="nav-link">Accueil</a>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-badge"><i></i> Acces securise</div>
    <h1>Bon retour</h1>
    <p class="card-sub">Connectez-vous ou creez votre compte.</p>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>
    <div id="msg-err" class="err"></div>
    <div id="msg-ok" class="ok"></div>
    <div id="pane-login">
      <div class="fgroup"><label>Email</label><input id="l-email" type="email" placeholder="vous@email.com" autocomplete="email"></div>
      <div class="fgroup"><label>Mot de passe</label><input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" id="btn-login" onclick="doLogin()">Se connecter</button>
    </div>
    <div id="pane-register" style="display:none">
      <div class="fgroup"><label>Nom d utilisateur</label><input id="r-user" type="text" placeholder="VotreNom"></div>
      <div class="fgroup"><label>Email</label><input id="r-email" type="email" placeholder="vous@email.com"></div>
      <div class="fgroup"><label>Mot de passe</label><input id="r-pass" type="password" placeholder="8 caracteres minimum"></div>
      <button class="btn" id="btn-register" onclick="doRegister()">Creer mon compte</button>
      <div class="free-note">5 recherches gratuites offertes a l inscription</div>
    </div>
  </div>
</main>
<footer><a href="cgu.html">CGU</a> · 2026 Xtracker</footer>
<script>
const API='';
function g(id){return document.getElementById(id)}
function showErr(msg){const e=g('msg-err');e.textContent=msg;e.style.display='block';g('msg-ok').style.display='none'}
function showOk(msg){const e=g('msg-ok');e.textContent=msg;e.style.display='block';g('msg-err').style.display='none'}
function hideMsg(){g('msg-err').style.display='none';g('msg-ok').style.display='none'}
function switchTab(t){
  hideMsg();
  g('tab-login').classList.toggle('active',t==='login');
  g('tab-register').classList.toggle('active',t==='register');
  g('pane-login').style.display=t==='login'?'block':'none';
  g('pane-register').style.display=t==='register'?'block':'none';
}
function isValidEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e)}
function setLoad(id,on,label){const b=g(id);b.disabled=on;b.innerHTML=on?'<span class="spinner"></span>Chargement...':label}
async function doLogin(){
  hideMsg();
  const email=g('l-email').value.trim(),pass=g('l-pass').value;
  if(!email||!pass){showErr('Remplissez tous les champs.');return}
  if(!isValidEmail(email)){showErr('Email invalide.');return}
  setLoad('btn-login',true,'Se connecter');
  try{
    const r=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok){showErr(d.detail||'Email ou mot de passe incorrect.');return}
    localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));
    showOk('Connexion reussie...');
    setTimeout(()=>{window.location.href=d.user.role==='admin'?'admin.html':'dashboard.html'},600);
  }catch(e){showErr('Erreur reseau.')}
  finally{setLoad('btn-login',false,'Se connecter')}
}
async function doRegister(){
  hideMsg();
  const username=g('r-user').value.trim(),email=g('r-email').value.trim(),pass=g('r-pass').value;
  if(!username||!email||!pass){showErr('Remplissez tous les champs.');return}
  if(!isValidEmail(email)){showErr('Email invalide.');return}
  if(pass.length<8){showErr('Mot de passe trop court (8 min).');return}
  setLoad('btn-register',true,'Creer mon compte');
  try{
    const r=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,username})});
    const d=await r.json();
    if(!r.ok){showErr(d.detail||'Erreur inscription.');return}
    localStorage.setItem('token',d.token);
    showOk('Compte cree ! Redirection...');
    setTimeout(()=>{window.location.href='dashboard.html'},800);
  }catch(e){showErr('Erreur reseau.')}
  finally{setLoad('btn-register',false,'Creer mon compte')}
}
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;g('pane-login').style.display!=='none'?doLogin():doRegister()});
const t=localStorage.getItem('token');
if(t){const u=JSON.parse(localStorage.getItem('user')||'{}');window.location.href=u.role==='admin'?'admin.html':'dashboard.html'}
</script>
</body>
</html>
