<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtracker — Œil néon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .eye-svg {
      filter: drop-shadow(0 0 6px white) drop-shadow(0 0 14px white);
      width: 100%;
      max-width: 640px;
    }
  </style>
</head>
<body>

<svg class="eye-svg" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" id="eyeSvg">
  <clipPath id="blinkClip">
    <rect id="blinkRect" x="0" y="0" width="680" height="440"/>
  </clipPath>
  
  <g clip-path="url(#blinkClip)">
    <!-- Contour principal de l'œil -->
    <path d="M 60 150 Q 200 50 340 45 Q 480 50 620 150 Q 575 205 510 232 C 504 236 501 241 500 250 C 498 263 499 279 495 300 C 492 316 485 328 476 328 C 467 328 460 316 457 300 C 453 279 454 263 452 250 C 451 241 448 236 443 233 Q 434 237 422 240 C 414 242 411 247 409 256 C 406 267 407 279 405 291 C 403 303 397 311 391 311 C 385 311 379 303 377 291 C 375 279 376 267 373 256 C 371 247 368 242 360 240" 
          fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Trait décoratif droit -->
    <line x1="600" y1="180" x2="650" y2="220" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="610" y1="170" x2="660" y2="210" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Trait décoratif gauche -->
    <line x1="80" y1="180" x2="30" y2="220" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="70" y1="170" x2="20" y2="210" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Pupille -->
    <circle cx="440" cy="260" r="15" fill="white" opacity="0.9"/>
    
    <!-- Reflet -->
    <circle cx="435" cy="255" r="5" fill="white"/>
  </g>
</svg>

<script>
  const blinkRect = document.getElementById('blinkRect');
  let blinkTimeout;

  function blink() {
    // Fermer l'œil
    blinkRect.setAttribute('y', 220);
    blinkRect.setAttribute('height', 0);
    
    // Rouvrir après 150ms
    setTimeout(() => {
      blinkRect.setAttribute('y', 0);
      blinkRect.setAttribute('height', 440);
    }, 150);
    
    // Prochain clignement aléatoire (3-7 secondes)
    blinkTimeout = setTimeout(blink, 3000 + Math.random() * 4000);
  }

  // Premier clignement après 3 secondes
  blinkTimeout = setTimeout(blink, 3000);
</script>

</body>
</html>
