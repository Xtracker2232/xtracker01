<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maintenance — Xtracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#070a14;color:#eef0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0}
.bg-dot{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
.bg-dot:nth-child(1){width:400px;height:400px;background:#6366f1;top:-100px;left:-100px}
.bg-dot:nth-child(2){width:300px;height:300px;background:#4f46e5;bottom:-50px;right:-50px}
.card{position:relative;z-index:1;background:rgba(12,15,32,0.8);border:1px solid rgba(99,102,241,0.2);border-radius:24px;padding:48px 40px;max-width:500px;width:100%;text-align:center;backdrop-filter:blur(20px)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#818cf8;margin-bottom:32px;letter-spacing:1px}
.logo span{color:#eef0ff}
.icon{font-size:56px;margin-bottom:20px;display:block}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:12px}
.subtitle{font-size:15px;color:rgba(238,240,255,0.55);line-height:1.6;margin-bottom:28px}
.msg-box{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:16px 20px;margin-bottom:24px;font-size:14px;color:rgba(238,240,255,0.8);display:none}
.timer-box{background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:12px;padding:20px;margin-bottom:28px;display:none}
.timer-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(238,240,255,0.4);margin-bottom:8px}
.timer-display{font-family:monospace;font-size:36px;font-weight:700;color:#818cf8;letter-spacing:4px}
.progress{height:3px;background:rgba(99,102,241,0.15);border-radius:2px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:2px;transition:width 1s linear}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .2s;border:none}
.btn-discord{background:rgba(88,101,242,0.15);border:1px solid rgba(88,101,242,0.3);color:#818cf8}
.btn-discord:hover{background:rgba(88,101,242,0.25)}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.dot{width:8px;height:8px;border-radius:50%;background:#6366f1;animation:bounce .8s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
</style>
</head>
<body>
<div class="bg"><div class="bg-dot"></div><div class="bg-dot"></div></div>
<div class="card">
  <div class="logo">X<span>tracker</span></div>
  <svg width="90" height="90" viewBox="0 0 100 100" style="margin-bottom:20px" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(50,50)">
    <g transform="rotate(-35)">
      <rect x="-3" y="-45" width="6" height="90" rx="2" fill="#818cf8"/>
      <rect x="-16" y="-51" width="32" height="14" rx="3" fill="#6366f1"/>
    </g>
    <g transform="rotate(35)">
      <rect x="-3" y="-45" width="6" height="90" rx="2" fill="#818cf8"/>
      <rect x="-16" y="-51" width="22" height="14" rx="2" fill="#6366f1"/>
      <polygon points="6,-51 22,-44 6,-37" fill="#818cf8"/>
    </g>
  </g>
</svg>
  <h1>Maintenance en cours</h1>
  <p class="subtitle" id="subtitle">Le site est temporairement indisponible pour maintenance. Nous reviendrons très bientôt !</p>

  <div class="msg-box" id="msg-box"></div>

  <div class="timer-box" id="timer-box">
    <div class="timer-label">Temps estimé restant</div>
    <div class="timer-display" id="timer-display">--:--:--</div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width:100%"></div></div>
  </div>

  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <a href="https://discord.gg/bYSDCmgcRz" class="btn btn-discord" target="_blank">
    <svg width="18" height="14" viewBox="0 0 24 18" fill="currentColor"><path d="M20.317 1.492a19.8 19.8 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 1.492a.07.07 0 0 0-.032.027C.533 5.968-.32 10.268.099 14.507c.01.088.06.16.128.208a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Rejoindre le Discord
  </a>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var msg = params.get('msg') || '';
var etaMin = parseInt(params.get('eta') || '0');
var startedAt = parseInt(params.get('started') || '0');

if(msg){
  var mb = document.getElementById('msg-box');
  mb.textContent = msg;
  mb.style.display = 'block';
  document.getElementById('subtitle').style.display = 'none';
}

if(etaMin > 0){
  var tb = document.getElementById('timer-box');
  tb.style.display = 'block';
  var totalSec = etaMin * 60;
  // Si on a l'heure de début, calculer le temps déjà écoulé
  var elapsed = startedAt > 0 ? Math.floor(Date.now()/1000) - startedAt : 0;
  var remaining = Math.max(0, totalSec - elapsed);
  var startTime = Date.now() - (elapsed * 1000);

  function updateTimer(){
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    remaining = Math.max(0, totalSec - elapsed);
    var h = Math.floor(remaining / 3600);
    var m = Math.floor((remaining % 3600) / 60);
    var s = remaining % 60;
    document.getElementById('timer-display').textContent =
      String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    var pct = (remaining / totalSec) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
    if(remaining > 0) setTimeout(updateTimer, 1000);
    else document.getElementById('timer-display').textContent = 'Bientot...';
  }
  updateTimer();
}

// Auto refresh toutes les 30s
setTimeout(function(){ window.location.reload(); }, 30000);
</script>
</body>
</html>
